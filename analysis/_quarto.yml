project:
  type: website
  output-dir: _site
  render:
    - report.qmd
    - index.qmd

website:
  title: "tessera — CRC PRS x CEA"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: report.qmd
        text: Statistical report

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    number-sections: true
    fig-width: 7
    fig-height: 4.5
    embed-resources: false

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
