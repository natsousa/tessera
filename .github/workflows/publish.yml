name: Publish Quarto report to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rocker-org/devcontainer/tidyverse:4.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends libnlopt-dev

      - name: Install R package dependencies
        run: |
          Rscript -e 'install.packages(c("broom","ggplot2","tibble","dplyr","tidyr","rlang","knitr","rmarkdown"), repos="https://cloud.r-project.org")'
          Rscript -e 'install.packages("devtools", repos="https://cloud.r-project.org")'

      - name: Install tessera
        run: Rscript -e 'devtools::install(".", upgrade=FALSE, dependencies=TRUE)'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto site
        run: quarto render analysis

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: analysis/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
